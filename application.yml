# ============================================================
# 1. COMMON APPLICATION PROPERTIES (맨 상단 공통 섹션)
# ============================================================
# 💡 중복되었던 server 섹션을 하나로 합쳤습니다.
server:
  port: 0
  shutdown: graceful
  tomcat:
    threads:
      max: 400
      min-spare: 40

spring:
  zipkin:
    enabled: false
  sql:
    init:
      schema-locations: classpath*:db/hsqldb/schema.sql
      data-locations: classpath*:db/hsqldb/data.sql
  sleuth:
    enabled: false
    sampler:
      probability: 1.0
  cloud:
    config:
      allow-override: true
      override-none: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  # 백엔드가 상시 가질 대규모 커넥션 설정
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 10
      connection-timeout: 30000

management.security.enabled: false
management.endpoints.web.exposure.include: "*"
spring.cloud.refresh.refreshable: false
logging.level.org.springframework: INFO

management:
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1

eureka:
  instance:
    prefer-ip-address: true

# Chaos Engineering
---
spring:
  config:
    activate:
      on-profile: chaos-monkey      
management.endpoint.chaosmonkey.enabled: true
chaos:
  monkey:
    enabled: true
    watcher:
      component: false
      controller: false
      repository: false
      rest-controller: false
      service: false

# ============================================================
# 2. DOCKER ENVIRONMENT PROPERTIES (쿠버네티스/도커 환경 섹션)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    config:
      uri: http://config-server:8888
management:
  tracing:
    enabled: false
