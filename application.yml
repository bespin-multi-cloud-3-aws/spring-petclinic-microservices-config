# ============================================================
# 1. COMMON APPLICATION PROPERTIES (맨 상단 공통 섹션)
# ============================================================
server:
  port: 0
  shutdown: graceful

spring:
  sql:
    init:
      schema-locations: classpath*:db/hsqldb/schema.sql
      data-locations: classpath*:db/hsqldb/data.sql
  sleuth:
    sampler:
      probability: 1.0
  cloud:
    config:
      allow-override: true
      override-none: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

  # ⭐ [여기에 추가 1] 백엔드가 상시 가질 대규모 커넥션 설정
  datasource:
    hikari:
      maximum-pool-size: 40    # 너무 과하지 않게 각 Pod당 40으로 조율
      minimum-idle: 10
      connection-timeout: 3000 # 커넥션 대기 시간 3초로 대폭 단축 (스레드 락 방지)

# ⭐ [여기에 추가 2] 동시 처리 톰캣 스레드 확장
server:
  tomcat:
    threads:
      max: 400
      min-spare: 40

management.security.enabled: false
management.endpoints.web.exposure.include: "*"
spring.cloud.refresh.refreshable: false
logging.level.org.springframework: INFO

management:
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1

eureka:
  instance:
    prefer-ip-address: true

# Chaos Engineering
---
spring:
  config:
    activate:
      on-profile: chaos-monkey      
management.endpoint.chaosmonkey.enabled: true
chaos:
  monkey:
    enabled: true
    watcher:
      component: false
      controller: false
      repository: false
      rest-controller: false
      service: false

# ============================================================
# 2. DOCKER ENVIRONMENT PROPERTIES (쿠버네티스/도커 환경 섹션)
# ============================================================
---
spring:
  config:
    activate:
      on-profile: docker
  # ⭐ [가장 중요] 기존에 누락되거나 잘못 잡혀있던 컨피그 서버의 '쿠버네티스 내부 도메인' 명시
  cloud:
    config:
      uri: http://config-server:8888
management:
  tracing:
    enabled: false
